# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: nitpicking

before:
  hooks:
    - go mod tidy

builds:
  - id: np
    main: ./cmd/np/
    binary: np
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=netgo,osusergo
    ldflags:
      - -s -w
      - -X github.com/pinkhop/nitpicking/internal/wiring.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: pinkhop
    name: nitpicking
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
